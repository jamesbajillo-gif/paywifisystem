# PAYWIFI dnsmasq drop-in
# Bind only to the LAN interface — never serve DHCP/DNS on WAN
interface=ens19
bind-interfaces
listen-address=10.10.0.1
except-interface=ens18

# DHCP pool for clients
dhcp-range=10.10.0.100,10.10.0.250,255.255.255.0,5m
dhcp-option=option:router,10.10.0.1
dhcp-option=option:dns-server,10.10.0.1

# DNS upstream — use Cloudflare + Google by default; edit as needed
no-resolv
server=1.1.1.1
server=8.8.8.8
cache-size=1000

# Don't read /etc/hosts (gateway shouldn't leak its own hostnames to clients)
no-hosts

# Log queries to file (helpful for debugging; comment out in production)
log-facility=/var/log/paywifi/dnsmasq.log
log-queries
log-dhcp

# DHCP lease file
dhcp-leasefile=/var/lib/misc/paywifi-dnsmasq.leases

# Identify ourselves to clients
dhcp-option=15,paywifi.lan
domain=paywifi.lan

# ─── Captive-portal probe domain spoofing ─────────────────────────────────────
# Force ALL OS connectivity-check domains to resolve to our gateway so probes
# are intercepted by nginx instead of going to the public internet.
#
# iOS / macOS (CNA)
# Android / ChromeOS
# Windows NCSI
# Firefox

# RFC 8910 Captive-Portal API (Android 11+/iOS 14+ reliable detection + release)
dhcp-option=114,"http://10.10.0.1/api/portal/captive-api"

# HARDEN-2026-06-03 — DNSSEC validation upstream
# (Some upstreams may not fully sign; if breakage observed, drop dnssec line)
dnssec
trust-anchor=.,20326,8,2,e06d44b80b8f1d39a95c0b0d7c65d08458e880409bbc683457104237c7f8ec8d
dnssec-check-unsigned

# HARDEN-2026-06-03 — domain → walled garden auto-allowlist
# Any A record returned for these domains is auto-added to paywifi_walled in
# the inet filter, inet captive, and ip nat tables. Eliminates the "Xendit
# changed IPs and payments break" failure mode.
nftset=/xendit.co/4#inet#filter#paywifi_walled
nftset=/xendit.co/4#inet#captive#paywifi_walled
nftset=/xendit.co/4#ip#nat#paywifi_walled

nftset=/gcash.com/4#inet#filter#paywifi_walled
nftset=/gcash.com/4#inet#captive#paywifi_walled
nftset=/gcash.com/4#ip#nat#paywifi_walled

nftset=/mynt.xyz/4#inet#filter#paywifi_walled
nftset=/mynt.xyz/4#inet#captive#paywifi_walled
nftset=/mynt.xyz/4#ip#nat#paywifi_walled

# HARDEN-2026-06-04 — YouTube live-stream HLS walled-garden allowlist.
# Required so the GMA News live widget can stream pre-auth (without these,
# the captive forward chain blocks all of googlevideo.com's CDN IPs).
nftset=/googlevideo.com/4#inet#filter#paywifi_walled
nftset=/googlevideo.com/4#inet#captive#paywifi_walled
nftset=/googlevideo.com/4#ip#nat#paywifi_walled

nftset=/youtube.com/4#inet#filter#paywifi_walled
nftset=/youtube.com/4#inet#captive#paywifi_walled
nftset=/youtube.com/4#ip#nat#paywifi_walled

nftset=/ytimg.com/4#inet#filter#paywifi_walled
nftset=/ytimg.com/4#inet#captive#paywifi_walled
nftset=/ytimg.com/4#ip#nat#paywifi_walled

nftset=/youtubei.googleapis.com/4#inet#filter#paywifi_walled
nftset=/youtubei.googleapis.com/4#inet#captive#paywifi_walled
nftset=/youtubei.googleapis.com/4#ip#nat#paywifi_walled
