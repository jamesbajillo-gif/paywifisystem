# PAYWIFI dnsmasq drop-in
# Bind only to the LAN interface — never serve DHCP/DNS on WAN
interface=ens19
bind-interfaces
listen-address=10.10.0.1
except-interface=ens18

# DHCP pool for clients
dhcp-range=10.10.0.100,10.10.0.250,255.255.255.0,2h
dhcp-option=option:router,10.10.0.1
dhcp-option=option:dns-server,10.10.0.1

# DNS upstream — use Cloudflare + Google by default; edit as needed
no-resolv
server=1.1.1.1
server=8.8.8.8
cache-size=1000

# Don't read /etc/hosts (gateway shouldn't leak its own hostnames to clients)
no-hosts

# Log queries to file (helpful for debugging; comment out in production)
log-facility=/var/log/paywifi/dnsmasq.log
log-queries
log-dhcp

# DHCP lease file
dhcp-leasefile=/var/lib/misc/paywifi-dnsmasq.leases

# Identify ourselves to clients
dhcp-option=15,paywifi.lan
domain=paywifi.lan

# ─── Captive-portal probe domain spoofing ─────────────────────────────────────
# Spoof ALL OS captive-check domains + portal hostname to gateway IP so:
#  a) probes are intercepted by nginx immediately (no DNAT race)
#  b) browser address bar shows paywifi.net instead of 10.10.0.1
#  c) captive.apple.com on older Android/Samsung is handled correctly

# iOS / macOS (CNA) — Apple captive probes
address=/captive.apple.com/10.10.0.1
address=/www.apple.com/10.10.0.1
address=/apple.com/10.10.0.1

# Android / ChromeOS captive probes (all versions)
address=/connectivitycheck.gstatic.com/10.10.0.1
address=/connectivitycheck.android.com/10.10.0.1
address=/clients3.google.com/10.10.0.1
address=/clients4.google.com/10.10.0.1
address=/android.clients.google.com/10.10.0.1
address=/www.gstatic.com/10.10.0.1

# Windows NCSI
address=/www.msftconnecttest.com/10.10.0.1
address=/www.msftncsi.com/10.10.0.1
address=/ipv6.msftncsi.com/10.10.0.1

# Firefox
address=/detectportal.firefox.com/10.10.0.1
address=/firefox.com/10.10.0.1

# Ubuntu / GNOME
address=/nmcheck.gnome.org/10.10.0.1
address=/network-test.debian.org/10.10.0.1

# RFC 8910 Captive-Portal API (Android 11+/iOS 14+ — use paywifi.net hostname)
dhcp-option=114,"http://10.10.0.1/api/portal/captive-api"
